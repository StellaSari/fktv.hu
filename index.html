<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fktv.hu | Rendszer-üzenet</title>
    <style>
        :root {
            --link-blue: #0645ad;
            --wiki-border: #a2a9b1;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'Instrument serif', 'Raleway', serif;
            color: #202122;
            background: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .main-container {
            max-width: 900px;
            width: 100%;
            border: 1px solid var(--wiki-border);
            background-color: white;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-gray);
            padding: 15px 25px;
            border-bottom: 1px solid var(--wiki-border);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: normal;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .content-area {
            display: flex;
            min-height: 400px;
        }

        /* A jellegzetes bal oldali sáv a tervedből */
        .sidebar {
            width: 200px;
            background-color: var(--bg-gray);
            border-right: 1px solid var(--wiki-border);
            padding: 20px;
            font-size: 0.85rem;
            color: #54595d;
        }

        .main-text {
            flex-grow: 1;
            padding: 40px;
            background-color: #ffffff;
        }

        .status-badge {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 2px 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .announcement {
            font-size: 1.4rem;
            line-height: 1.4;
            border-left: 4px solid var(--wiki-border);
            padding-left: 20px;
            margin: 20px 0;
        }

        /* Form stílus a terved alapján */
        .form-box {
            margin-top: 40px;
            padding: 20px;
            border: 1px solid #eee;
            background: var(--bg-gray);
        }

        input[type="email"] {
            border: 1px solid var(--wiki-border);
            padding: 8px;
            width: 250px;
            font-family: 'Raleway', sans-serif;
        }

        button {
            background: #202122;
            color: white;
            border: 1px solid #202122;
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Raleway', sans-serif;
            font-weight: bold;
        }

        /* Sütisáv - most már puritánabb stílusban */
        #cookie-consent {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            border: 1px solid var(--wiki-border);
            background: white;
            padding: 15px;
            font-size: 0.8rem;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>fktv.hu <span style="color: var(--wiki-border);">/</span> rendszer-üzenet</h1>
        </header>

        <div class="content-area">
            <div class="sidebar">
                <strong>STÁTUSZ:</strong><br>Fejlesztés alatt<br><br>
                <strong>VERZIÓ:</strong><br>2026.03_04_14.2<br><br>
                <strong>FÓKUSZ:</strong><br>Felnőttképzési szakértői protokoll
            </div>

            <div class="main-text">
                <div class="status-badge">HAMAROSAN</div>
                <div class="announcement">
                    Új felnőttképzési szakértői protokoll [2026]
        
                </div>

            
            </div>
        </div>
    </div>

    <div id="cookie-consent">
        <p style="margin-top: 0;">A rendszer funkcionális sütiket használ.</p>
        <button onclick="setConsent(true)" style="font-size: 0.7rem; padding: 4px 10px;">Elfogadom, nem gond.</button>
        <button onclick="setConsent(false)" style="font-size: 0.7rem; padding: 4px 10px; background: none; color: black; border: 1px solid black;">Hm, inkább cukrászdában választom a sütit.</button>
    </div>

    <script>
        function setConsent(accepted) {
            document.getElementById('cookie-consent').classList.add('hidden');
            localStorage.setItem('fktv_cookie', accepted ? 'ok' : 'no');
        }
        if (localStorage.getItem('fktv_cookie')) {
            document.getElementById('cookie-consent').classList.add('hidden');
        }
    </script>

</body>
</html>
